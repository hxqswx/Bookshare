<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1b4332"/>
      <stop offset="100%" stop-color="#40916c"/>
    </linearGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8f3dc"/>
      <stop offset="100%" stop-color="#b7e4c7"/>
    </linearGradient>
  </defs>

  <!-- App icon background — rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect width="512" height="512" rx="112" fill="white" opacity="0.04"/>

  <!-- ── Open book ── -->
  <!-- Left page shadow -->
  <path d="M110 170 C110 156 122 146 136 148 L248 164 L248 380 L136 364 C122 362 110 352 110 338 Z"
        fill="white" opacity="0.15"/>
  <!-- Left page -->
  <path d="M118 162 C118 148 130 138 144 140 L248 156 L248 372 L144 356 C130 354 118 344 118 330 Z"
        fill="white" opacity="0.92"/>

  <!-- Right page shadow -->
  <path d="M402 170 C402 156 390 146 376 148 L264 164 L264 380 L376 364 C390 362 402 352 402 338 Z"
        fill="white" opacity="0.15"/>
  <!-- Right page -->
  <path d="M394 162 C394 148 382 138 368 140 L264 156 L264 372 L368 356 C382 354 394 344 394 330 Z"
        fill="white" opacity="0.92"/>

  <!-- Spine highlight -->
  <rect x="248" y="148" width="16" height="230" rx="4" fill="url(#spine)" opacity="0.6"/>

  <!-- Text lines on left page -->
  <line x1="148" y1="208" x2="234" y2="214" stroke="#2d6a4f" stroke-width="9" stroke-linecap="round" opacity="0.35"/>
  <line x1="148" y1="238" x2="234" y2="244" stroke="#2d6a4f" stroke-width="9" stroke-linecap="round" opacity="0.35"/>
  <line x1="148" y1="268" x2="234" y2="274" stroke="#2d6a4f" stroke-width="9" stroke-linecap="round" opacity="0.35"/>
  <line x1="148" y1="298" x2="210" y2="303" stroke="#2d6a4f" stroke-width="9" stroke-linecap="round" opacity="0.25"/>

  <!-- Text lines on right page -->
  <line x1="278" y1="214" x2="364" y2="208" stroke="#2d6a4f" stroke-width="9" stroke-linecap="round" opacity="0.35"/>
  <line x1="278" y1="244" x2="364" y2="238" stroke="#2d6a4f" stroke-width="9" stroke-linecap="round" opacity="0.35"/>
  <line x1="278" y1="274" x2="364" y2="268" stroke="#2d6a4f" stroke-width="9" stroke-linecap="round" opacity="0.35"/>
  <line x1="278" y1="303" x2="344" y2="298" stroke="#2d6a4f" stroke-width="9" stroke-linecap="round" opacity="0.25"/>

  <!-- Small heart accent bottom-right -->
  <circle cx="388" cy="376" r="36" fill="#52b788" opacity="0.9"/>
  <path d="M388 394 C388 394 372 382 372 372 C372 366 377 362 382 362 C385 362 388 365 388 365 C388 365 391 362 394 362 C399 362 404 366 404 372 C404 382 388 394 388 394 Z"
        fill="white"/>
